# Render Blueprint — connect at https://dashboard.render.com/blueprints
services:
  - type: web
    name: pro-trader
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: SECRET_KEY
        generateValue: true