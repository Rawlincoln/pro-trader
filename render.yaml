services:
  - type: web
    name: pro-trader
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /